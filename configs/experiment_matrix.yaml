project:
  name: comp547-arpg-tradeoff
  seed: 547
  output_root: results

compute:
  default_device: cuda
  preferred_gpu: t4
  fallback_gpu: a100
  mixed_precision: true

datasets:
  fashion_mnist:
    image_size: 28
    channels: 1
    num_classes: 10
    split: train
  cifar10:
    image_size: 32
    channels: 3
    num_classes: 10
    split: train

model:
  vocab_size: 256
  mask_token_id: 256
  d_model: 384
  n_heads: 6
  n_layers: 8
  dropout: 0.1

baseline:
  train_epochs: 30
  batch_size: 128
  learning_rate: 0.0003
  weight_decay: 0.01
  eval_every_steps: 500

parallel_decode:
  schedules:
    - random
    - block-raster
  block_sizes:
    fashion_mnist: [4, 16]
    cifar10: [4, 16, 64]
  max_steps_multiplier: 2.0

metrics:
  quality:
    - fid
  efficiency:
    - latency_ms
    - throughput_img_s
  repeats:
    pilot: 1
    critical: 3
